name: Keep Alive

on:
  schedule:
    # Chạy vào 00:00 mỗi Chủ Nhật hàng tuần (đảm bảo luôn có activity)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Cho phép bạn nhấn nút chạy thủ công để kiểm tra

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Keep repository active
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last heartbeat: $(date)" > heartbeat.txt
          git add heartbeat.txt
          git commit -m "Keep-alive: Update heartbeat $(date)" || exit 0
          git push
